name: Validation CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validation-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation:
    name: Python 3.12 validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      MPLBACKEND: Agg
      PYTHONPATH: src
      PYTHONHASHSEED: "0"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      TZ: UTC

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install repository dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Verify deterministic environment
        run: |
          python --version
          python -c "import numpy, pandas, matplotlib, pytest, pydantic, openai; print('Dependency imports: PASS')"
          python -c "import matplotlib; assert matplotlib.get_backend().lower() == 'agg'; print('Matplotlib backend:', matplotlib.get_backend())"
          python -m compileall -q src scripts tests

      - name: Run repository validation suite
        run: |
          mkdir -p test-results
          python -m pytest -q --junitxml=test-results/pytest.xml

      - name: Upload pytest evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results-python-3.12
          path: test-results/pytest.xml
          if-no-files-found: error
          retention-days: 14